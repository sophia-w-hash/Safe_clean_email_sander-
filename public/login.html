<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Mailer Login</title>
    <style>
        body { font-family: Arial, sans-serif; background: #eef2f3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #fff; padding: 40px; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); width: 100%; max-width: 380px; }
        h2 { text-align: center; margin-bottom: 24px; color: #333; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { background: #28a745; color: white; border: none; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background: #218838; }
        .back-link { text-align: center; margin-top: 15px; }
        .back-link a { color: #555; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Secure Login</h2>
    <form onsubmit="alert('Login Logic Connected!'); return false;">
        <input type="text" placeholder="Username" required>
        <input type="password" placeholder="Password" required>
        <button type="submit">Log In</button>
    </form>
    <div class="back-link">
        <a href="launcher.html">← Back to Launcher</a>
    </div>
</div>

</body>
</html>
