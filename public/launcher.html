<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fast Mailer — Launcher</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* same styling as before */
</style>
</head>
<body>
<div class="container">
  <h2>📧 Send Email</h2>
  <div class="field"><label>Sender Name</label><input id="senderName" type="text" placeholder="Optional"></div>
  <div class="field"><label>Recipient Email</label><input id="to" type="email" placeholder="client@example.com"></div>
  <div class="field"><label>Subject</label><input id="subject" type="text" placeholder="Enter subject"></div>
  <div class="field"><label>Message</label><textarea id="messageBody" placeholder="Write your message"></textarea></div>
  <button class="btn" id="sendBtn">Send Email →</button>
  <div class="status" id="status"></div>
  <div class="logout"><button id="logoutBtn">Logout</button></div>
</div>
<script>
const sendBtn=document.getElementById('sendBtn'),st=document.getElementById('status');
async function sendEmail(){
  const senderName=document.getElementById('senderName').value.trim();
  const to=document.getElementById('to').value.trim();
  const subject=document.getElementById('subject').value.trim();
  const messageBody=document.getElementById('messageBody').value.trim();
  if(!to||!subject||!messageBody){st.className='status error';st.textContent='All required fields must be filled';return}
  sendBtn.disabled=true;sendBtn.textContent='Sending...';st.className='status';
  try{
    const r=await fetch('/api/send-email',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({senderName,to,subject,messageBody})});
    const d=await r.json();
    if(d.success){st.className='status success';st.textContent='✅ Email sent successfully!';}
    else{st.className='status error';st.textContent='❌ '+(d.message||'Failed to send');}
  }catch(e){st.className='status error';st.textContent='❌ Connection error';}
  sendBtn.disabled=false;sendBtn.textContent='Send Email →';
}
sendBtn.addEventListener('click',sendEmail);
document.getElementById('logoutBtn').addEventListener('click',async()=>{
  await fetch('/logout',{method:'POST'});window.location.href='/';
});
</script>
</body>
</html>
