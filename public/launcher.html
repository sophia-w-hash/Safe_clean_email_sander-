<!-- Is file ko poora replace karne ke liye, launcher.html ke javascript script tag ke andar sendAll() function ko isse replace karein ya poori file ka script update kar lein -->

<script>
// ... (Aapke baki saare helper functions jaise parseEmails, countRecipients, etc. same rahenge)

async function sendAll(){
  const emails=validate();if(!emails)return;
  const senderName=document.getElementById('senderName').value.trim();
  const gmailId=document.getElementById('gmailId').value.trim();
  const appPassword=document.getElementById('appPassword').value.trim();
  const subject=document.getElementById('subject').value.trim();
  const messageBody=document.getElementById('messageBody').value.trim();
  const btn=document.getElementById('sendBtn');
  
  btn.disabled=true;btn.innerHTML='⏳ Sending...';
  clearLog();setStatus('sending','📤',`Sending to ${emails.length} recipients...`);setProgress(0,emails.length);
  
  let ok=0,fail=0;

  // Exact 6 parallel chunk loop jaisa aapne manga tha
  for(let i=0; i<emails.length; i+=6){
    const chunk = emails.slice(i, i+6);
    
    const promises = chunk.map(async (email) => {
      try{
        // Fetch request with a 15-second timeout safeguard
        const controller = new AbortController();
        const id = setTimeout(() => controller.abort(), 15000);

        const res=await fetch('/api/send-email',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({senderName,gmailId,appPassword,subject,messageBody,to:email}),
          signal: controller.signal
        });
        clearTimeout(id);

        const d=await res.json();
        if(res.ok&&d.success){ok++;addLog('ok','✅',`Delivered → ${email}`)}
        else{fail++;addLog('fail','❌',`Failed → ${email} (${d.message || 'Error'})`)}
      }catch(err){
        fail++;
        addLog('fail','❌',`Error/Timeout → ${email}`)
      }
    });

    await Promise.all(promises);
    
    setProgress(Math.min(i + chunk.length, emails.length), emails.length);
    
    // Har 6 emails ke set ke baad exact 1 second (1000ms) ka standard sleep
    if(i + 6 < emails.length) {
        await sleep(1000);
    }
  }

  if(fail===0){setStatus('success','🎉',`All ${ok} emails sent successfully!`);addLog('ok','✅',`${ok} emails delivered successfully`)}
  else if(ok===0){setStatus('error','💥',`All ${fail} emails failed. Check credentials.`);addLog('fail','❌',`All ${fail} failed — check Gmail & App Password`)}
  else{setStatus('sending','⚠️',`${ok} sent, ${fail} failed`);addLog('ok','✅',`${ok} delivered`);addLog('fail','❌',`${fail} failed`)}
  addLog('info','📊',`Total: ${emails.length}  ·  ✅ ${ok} success  ·  ❌ ${fail} failed`);
  btn.disabled=false;btn.innerHTML='🚀 Send All Emails';
}
// ... (baki functions same hain)
</script>
