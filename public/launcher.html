<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fast Mailer Launcher</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #333; }
        input, textarea, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; font-size: 16px; cursor: pointer; font-weight: bold; }
        button:hover { background: #0056b3; }
        .link-btn { text-align: center; margin-top: 15px; }
        .link-btn a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>🚀 Secure Email Launcher</h2>
    <form id="emailForm">
        <input type="email" id="toEmail" placeholder="To: Client Email Address" required>
        <input type="text" id="subject" placeholder="Subject" required>
        <textarea id="message" rows="5" placeholder="Enter your text or HTML message here..." required></textarea>
        <button type="submit" id="sendBtn">Send To Inbox</button>
    </form>
    
    <div class="link-btn">
        <a href="login.html">Go to Login Page →</a>
    </div>
</div>

<script>
    document.getElementById('emailForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const sendBtn = document.getElementById('sendBtn');
        const to = document.getElementById('toEmail').value;
        const subject = document.getElementById('subject').value;
        const messageBody = document.getElementById('message').value;

        sendBtn.innerText = "Sending...";
        sendBtn.disabled = true;

        try {
            // ऑटोमैटिक चेक कि मैसेज टेक्स्ट है या HTML
            const isHtml = messageBody.includes('<') && messageBody.includes('>');
            
            const response = await fetch('/send-email', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    to: to,
                    subject: subject,
                    text: isHtml ? "Please view this email in HTML format." : messageBody,
                    html: isHtml ? messageBody : `<p>${messageBody}</p>`
                })
            });

            const data = await response.json();
            
            if (data.success) {
                alert('Success: Email delivered directly to Inbox!');
                document.getElementById('emailForm').reset();
            } else {
                alert('Error: ' + data.message);
            }
        } catch (err) {
            alert('Server error connecting to backend.');
            console.error(err);
        } finally {
            sendBtn.innerText = "Send To Inbox";
            sendBtn.disabled = false;
        }
    });
</script>

</body>
</html>
